name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy_edge_functions:
    name: Deploy Supabase Edge Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      
      - name: Push Secrets to Supabase
        run: |
          supabase secrets set --project-ref "$SUPABASE_PROJECT_ID" \
            VAULT_SECRET_KEY="$VAULT_SECRET_KEY" \
            UPSTASH_REDIS_REST_URL="$UPSTASH_REDIS_REST_URL" \
            UPSTASH_REDIS_REST_TOKEN="$UPSTASH_REDIS_REST_TOKEN" \
            ALLOWED_ORIGIN="$ALLOWED_ORIGIN"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          VAULT_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          ALLOWED_ORIGIN: ${{ secrets.ALLOWED_ORIGIN }}
        
      - name: Deploy Edge Functions
        run: supabase functions deploy --no-verify-jwt --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
